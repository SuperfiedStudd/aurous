name: Bug report
description: Report reproducible Aurous behavior
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Review diagnostic output for secrets before sharing it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aurous and Node versions
      placeholder: aurous 0.1.0; Node 20.x
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options: [Codex + Notion, Codex + Linear, Claude Code + Notion, Claude Code + Linear, Mock]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide commands without credentials or private context.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Output from aurous diagnose <run-id> --verbose, reviewed before posting.
      render: shell
